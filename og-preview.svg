<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5000ca"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="purpleGradH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5000ca"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)" rx="48"/>

  <!-- Soft center glow -->
  <circle cx="256" cy="256" r="160" fill="#5000ca" opacity="0.07" filter="url(#softGlow)"/>

  <!-- Hexagon vertices (r=110):
       top:        256, 146
       top-right:  351, 201
       bot-right:  351, 311
       bottom:     256, 366
       bot-left:   161, 311
       top-left:   161, 201
  -->

  <!-- Neural connections from each vertex outward -->
  <g stroke="#7c3aed" stroke-width="1.2" opacity="0.45">
    <!-- top -->
    <line x1="256" y1="146" x2="180" y2="72"/>
    <line x1="256" y1="146" x2="256" y2="60"/>
    <line x1="256" y1="146" x2="332" y2="72"/>
    <!-- top-right -->
    <line x1="351" y1="201" x2="420" y2="150"/>
    <line x1="351" y1="201" x2="440" y2="210"/>
    <line x1="351" y1="201" x2="410" y2="120"/>
    <!-- bot-right -->
    <line x1="351" y1="311" x2="420" y2="362"/>
    <line x1="351" y1="311" x2="440" y2="300"/>
    <line x1="351" y1="311" x2="430" y2="370"/>
    <!-- bottom -->
    <line x1="256" y1="366" x2="180" y2="440"/>
    <line x1="256" y1="366" x2="256" y2="452"/>
    <line x1="256" y1="366" x2="332" y2="440"/>
    <!-- bot-left -->
    <line x1="161" y1="311" x2="92" y2="362"/>
    <line x1="161" y1="311" x2="72" y2="300"/>
    <line x1="161" y1="311" x2="82" y2="370"/>
    <!-- top-left -->
    <line x1="161" y1="201" x2="92" y2="150"/>
    <line x1="161" y1="201" x2="72" y2="210"/>
    <line x1="161" y1="201" x2="102" y2="120"/>
  </g>

  <!-- Secondary neural nodes (outer) -->
  <g fill="#a855f7" opacity="0.6" filter="url(#glow)">
    <circle cx="180" cy="72" r="4"/>
    <circle cx="256" cy="60" r="4"/>
    <circle cx="332" cy="72" r="4"/>
    <circle cx="420" cy="150" r="4"/>
    <circle cx="440" cy="210" r="4"/>
    <circle cx="410" cy="120" r="4"/>
    <circle cx="420" cy="362" r="4"/>
    <circle cx="440" cy="300" r="4"/>
    <circle cx="430" cy="370" r="4"/>
    <circle cx="180" cy="440" r="4"/>
    <circle cx="256" cy="452" r="4"/>
    <circle cx="332" cy="440" r="4"/>
    <circle cx="92" cy="362" r="4"/>
    <circle cx="72" cy="300" r="4"/>
    <circle cx="82" cy="370" r="4"/>
    <circle cx="92" cy="150" r="4"/>
    <circle cx="72" cy="210" r="4"/>
    <circle cx="102" cy="120" r="4"/>
  </g>

  <!-- Hexagon outer glow fill -->
  <polygon points="256,146 351,201 351,311 256,366 161,311 161,201"
    fill="#5000ca" opacity="0.12"/>

  <!-- Hexagon border -->
  <polygon points="256,146 351,201 351,311 256,366 161,311 161,201"
    fill="none" stroke="url(#purpleGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Inner circuit lines inside hexagon -->
  <g stroke="#7c3aed" stroke-width="1.8" opacity="0.75">
    <!-- horizontal mid -->
    <line x1="196" y1="256" x2="316" y2="256"/>
    <!-- vertical top-bottom -->
    <line x1="256" y1="186" x2="256" y2="326"/>
    <!-- cross connectors -->
    <line x1="196" y1="256" x2="224" y2="206"/>
    <line x1="316" y1="256" x2="288" y2="206"/>
    <line x1="196" y1="256" x2="224" y2="306"/>
    <line x1="316" y1="256" x2="288" y2="306"/>
  </g>

  <!-- Inner circuit nodes -->
  <g filter="url(#glow)">
    <circle cx="196" cy="256" r="5" fill="#a855f7"/>
    <circle cx="316" cy="256" r="5" fill="#a855f7"/>
    <circle cx="256" cy="186" r="5" fill="#a855f7"/>
    <circle cx="256" cy="326" r="5" fill="#a855f7"/>
    <circle cx="224" cy="206" r="4" fill="#7c3aed"/>
    <circle cx="288" cy="206" r="4" fill="#7c3aed"/>
    <circle cx="224" cy="306" r="4" fill="#7c3aed"/>
    <circle cx="288" cy="306" r="4" fill="#7c3aed"/>
  </g>

  <!-- Hexagon vertex nodes -->
  <g filter="url(#glow)">
    <circle cx="256" cy="146" r="7" fill="#a855f7"/>
    <circle cx="351" cy="201" r="7" fill="#a855f7"/>
    <circle cx="351" cy="311" r="7" fill="#a855f7"/>
    <circle cx="256" cy="366" r="7" fill="#a855f7"/>
    <circle cx="161" cy="311" r="7" fill="#a855f7"/>
    <circle cx="161" cy="201" r="7" fill="#a855f7"/>
  </g>

  <!-- Center glowing dot -->
  <circle cx="256" cy="256" r="10" fill="url(#purpleGrad)" filter="url(#softGlow)"/>
  <circle cx="256" cy="256" r="5" fill="white" opacity="0.9"/>
</svg>
